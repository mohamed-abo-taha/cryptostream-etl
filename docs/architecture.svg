<svg width="680" height="250" viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .hdr { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .t   { font-size: 13px; font-weight: 700; }
    .ts  { font-size: 11px; }
    .lg  { font-size: 11px; fill: #444441; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="250" fill="#ffffff"/>

  <text class="hdr" x="40" y="32">CryptoStream — REST/scrape → SQL ETL pipeline</text>

  <g>
    <rect x="40" y="52" width="112" height="58" rx="6" fill="#F1EFE8" stroke="#888780"/>
    <text class="t" x="96" y="78" text-anchor="middle" fill="#2C2C2A">Sources</text>
    <text class="ts" x="96" y="95" text-anchor="middle" fill="#5F5E5A">REST/scrape/mock</text>
  </g>
  <g>
    <rect x="162" y="52" width="112" height="58" rx="6" fill="#EEEDFE" stroke="#7F77DD"/>
    <text class="t" x="218" y="78" text-anchor="middle" fill="#26215C">Transform</text>
    <text class="ts" x="218" y="95" text-anchor="middle" fill="#534AB7">clean, dedup</text>
  </g>
  <g>
    <rect x="284" y="52" width="112" height="58" rx="6" fill="#FAEEDA" stroke="#EF9F27"/>
    <text class="t" x="340" y="78" text-anchor="middle" fill="#412402">Quality gate</text>
    <text class="ts" x="340" y="95" text-anchor="middle" fill="#854F0B">block bad data</text>
  </g>
  <g>
    <rect x="406" y="52" width="112" height="58" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
    <text class="t" x="462" y="78" text-anchor="middle" fill="#04342C">Load</text>
    <text class="ts" x="462" y="95" text-anchor="middle" fill="#0F6E56">SQLite (SQL)</text>
  </g>
  <g>
    <rect x="528" y="52" width="112" height="58" rx="6" fill="#FAECE7" stroke="#D85A30"/>
    <text class="t" x="584" y="78" text-anchor="middle" fill="#4A1B0C">Serve</text>
    <text class="ts" x="584" y="95" text-anchor="middle" fill="#993C1D">API + dashboard</text>
  </g>
  <line x1="152" y1="81" x2="161" y2="81" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="274" y1="81" x2="283" y2="81" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="396" y1="81" x2="405" y2="81" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="518" y1="81" x2="527" y2="81" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="138" width="600" height="34" rx="6" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="lg" x="340" y="159" text-anchor="middle">Apache Airflow schedules this hourly (retries + quality gate) · Docker Compose · GitHub Actions CI</text>

  <rect x="40" y="200" width="12" height="12" rx="2" fill="#B4B2A9"/><text class="lg" x="58" y="210">Source</text>
  <rect x="140" y="200" width="12" height="12" rx="2" fill="#7F77DD"/><text class="lg" x="158" y="210">Transform</text>
  <rect x="260" y="200" width="12" height="12" rx="2" fill="#EF9F27"/><text class="lg" x="278" y="210">Quality gate</text>
  <rect x="390" y="200" width="12" height="12" rx="2" fill="#5DCAA5"/><text class="lg" x="408" y="210">Storage (SQL)</text>
  <rect x="520" y="200" width="12" height="12" rx="2" fill="#D85A30"/><text class="lg" x="538" y="210">Serve</text>
</svg>
